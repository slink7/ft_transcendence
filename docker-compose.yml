services:
  wextrapi:
    build: ./api
    container_name: "api"
    ports: 
      - "3001:3001"
    env_file:
      - .env
  database:
    build: ./database
    container_name: "database"
    ports: 
      - "5432:5432"
    env_file:
      - .env
  backend:
    build: ./backend
    ports:
      - "$PORT:$PORT"
    volumes:
      - ./backend:/app
      - ./shared:/app/shared
      - /app/node_modules
    environment:
      - PORT=$PORT
      - TICK_RATE=$TICK_RATE
    command: npm run dev

  frontend:
    environment:
      - VITE_WS_URL=$WS_URL
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - ./shared:/app/shared
      - /app/node_modules
    command: npm run dev
